management.endpoints.web.exposure.include=*

spring.boot.admin.client.url=http://localhost:9091

#Circuit Breaker Configuration

resilience4j.circuitbreaker.instances.departmentService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.departmentService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.departmentService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.departmentService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.departmentService.waitDurationInHalfOpenState=30s
resilience4j.circuitbreaker.instances.departmentService.permittedNumberOfCallsInOpenState=3
resilience4j.circuitbreaker.instances.departmentService.automaticTransitionFromOpenToHalfOpenEnabled=true

#Retry Configuration

resilience4j.retry.instances.departmentService.maxAttempts=3
resilience4j.retry.instances.departmentService.waitDuration=2s