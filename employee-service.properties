eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

message=Uptaded message 2 Hello from employee-service config server!

management.endpoints.web.exposure.include=*

spring.boot.admin.client.url=http://localhost:9091

#Circuit Breaker Configuration

resilience4j.circuitbreaker.instances.departmentService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.departmentService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.departmentService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.departmentService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.departmentService.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.departmentService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.departmentService.automaticTransitionFromOpenToHalfOpenEnabled=true

#Retry Configuration

resilience4j.retry.instances.departmentService.maxAttempts=3
resilience4j.retry.instances.departmentService.waitDuration=3s
logging.level.io.github.resilience4j.retry=DEBUG

#Rate Limiter Configuration

resilience4j.ratelimiter.instances.departmentService.limitForPeriod=5
resilience4j.ratelimiter.instances.departmentService.limitRefreshPeriod=10s
resilience4j.ratelimiter.instances.departmentService.timeoutDuration=0s

#Bulkhead Configuration

resilience4j.bulkhead.instances.departmentService.maxConcurrentCalls=3
resilience4j.bulkhead.instances.departmentService.maxWaitDuration=0s

#TimeLimiter Configuration

resilience4j.timelimiter.instances.departmentService.timeoutDuration=5s
resilience4j.timelimiter.instances.departmentService.cancelRunningFuture=true